name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@6fcdcde033ec670ac3832b239427fd2ded591bbc
    # lts (1.10) excluded while the unregistered kit is pinned via [sources],
    # which Pkg only understands on >= 1.11 (EpiAwarePackageTools#115).
    with:
      julia_versions: '["1", "pre"]'
    secrets: inherit  # pragma: allowlist secret

  downgrade-compat:
    uses: EpiAware/.github/.github/workflows/downgrade.yml@6fcdcde033ec670ac3832b239427fd2ded591bbc
    # TEMPORARILY DISABLED (kit #216): the downgrade harness cannot see
    # [sources]-pinned deps ("could not find manifest entry" for the
    # unregistered EpiAwareADTools). Re-enable, with julia_version 1.11
    # while the kit pin remains, once EpiAwareADTools is registered.
    if: false
    with:
      julia_version: '1.11'
    secrets: inherit  # pragma: allowlist secret
