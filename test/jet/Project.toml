# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
# Isolated JET environment so JET's JuliaSyntax pin does not clash with the
# main test deps. Add any extra packages JET needs to load the target here.
[deps]
EpiAwareADTools = "908e2895-a690-4874-a954-ca006cb9734d"
EpiAwarePackageTools = "7aaea248-0d11-4a0d-a7dc-86da30abb951"
JET = "c3a54625-cd67-489e-a8e7-0a5a0ff4e31b"
ConvolvedDistributions = "f5b942c9-bc5b-4664-8486-7f531bb06742"

[sources]
ConvolvedDistributions = {path = "../.."}
# Until EpiAwareADTools and EpiAwarePackageTools are registered, they
# are pinned by git so the env resolves out of the box ([sources] of a
# path dep are not honoured, so the package's own pin does not cover
# this env). Switch to a local path to develop either alongside this
# package.
EpiAwareADTools = {url = "https://github.com/EpiAware/EpiAwareADTools.jl", rev = "main"}
EpiAwarePackageTools = {url = "https://github.com/EpiAware/EpiAwarePackageTools.jl", rev = "main"}

# Pin JET to its current 0.x series so a new minor (which is a breaking bump
# under Julia's 0.x semver) cannot silently tighten static analysis and turn
# the managed check red without a deliberate bump (see kit #77, #60, #73).
[compat]
JET = "0.11"
